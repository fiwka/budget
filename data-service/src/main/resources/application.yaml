spring:
  application:
    name: data-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL}
  quartz:
    auto-startup: true
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceName: data-service-quartz
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.scheduler.skipUpdateCheck: true
      org.quartz.threadPool.threadCount: 5
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 15000
      org.quartz.jobStore.misfireThreshold: 60000
springdoc:
  swagger-ui:
    path: /swagger-ui.html
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_SERVER}/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    xyz.fiwka.budget.dataservice.infrastructure.scheduling: INFO
    xyz.fiwka.budget.dataservice.application.service.outbox: INFO

app:
  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-this-secret-key-to-at-least-32-characters}
      expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
  kafka:
    topic:
      transaction-created: transaction-created
  outbox:
    batch-size: 100
    scheduler:
      cron: "0 */1 * * * ?"
