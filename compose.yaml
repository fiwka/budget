services:
  eureka-server:
    image: ghcr.io/fiwka/eureka-server:latest
    hostname: eureka
    networks:
      - budget
    ports:
      - "8082:8761"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
  api-gateway:
    image: ghcr.io/fiwka/api-gateway:latest
    hostname: api-gateway
    networks:
      - budget
    environment:
      REDIS_HOST: redis
      EUREKA_SERVER: eureka:8761
    ports:
      - "8090:8080"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy
  redis:
    image: redis:latest
    hostname: redis
    networks:
      - budget
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
  data-service:
    image: ghcr.io/fiwka/data-service:latest
    networks:
      - budget
    environment:
      POSTGRES_HOST: budget-data-pg
      POSTGRES_PORT: 5432
      POSTGRES_DB: budget_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_SERVER: eureka:8761
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8080:8080"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      eureka-server:
        condition: service_healthy
      budget_data_pg:
        condition: service_healthy
      kafka:
        condition: service_started
      budget_data_migrations:
        condition: service_completed_successfully
  analytics-service:
    image: ghcr.io/fiwka/analytics-service:latest
    networks:
      - budget
    environment:
      POSTGRES_HOST: budget-analytics-pg
      POSTGRES_PORT: 5432
      POSTGRES_DB: budget_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_SERVER: eureka:8761
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8081:8080"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      eureka-server:
        condition: service_healthy
      budget_analytics_pg:
        condition: service_healthy
      kafka:
        condition: service_started
  kafka:
    image: apache/kafka-native:latest
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093,BROKER://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    networks:
      - budget
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRYURL: http://schema-registry:8081
    networks:
      - budget
  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.0
    container_name: schema-registry
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - budget
  budget_data_pg:
    image: postgres
    hostname: budget-data-pg
    environment:
      POSTGRES_PASSWORD: qwerty123
      POSTGRES_DB: budget_data
    volumes:
      - ./docker_data/budget_data:/var/lib/postgresql
    networks:
      - budget
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 15s
      retries: 5
  budget_analytics_pg:
    image: postgres
    hostname: budget-analytics-pg
    environment:
      POSTGRES_PASSWORD: qwerty123
      POSTGRES_DB: budget_analytics
    volumes:
      - ./docker_data/budget_analytics:/var/lib/postgresql
    networks:
      - budget
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 15s
      retries: 5
  budget_data_migrations:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    command: --url=jdbc:postgresql://budget-data-pg:5432/budget_data --username=postgres --password=qwerty123 --changelog-file=data/db/master.yaml update
    depends_on:
      budget_data_pg:
        condition: service_healthy
    networks:
      - budget
  budget_analytics_migrations:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    command: --url=jdbc:postgresql://budget-analytics-pg:5432/budget_analytics --username=postgres --password=qwerty123 --changelog-file=analytics/db/master.yaml update
    depends_on:
      budget_analytics_pg:
        condition: service_healthy
    networks:
      - budget
networks:
  budget: